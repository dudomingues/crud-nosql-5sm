<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>CRUD Clientes</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Cadastro de Clientes</h1>

        <div class="card">

            <form id="formCliente">

                <input type="hidden" id="id">

                <input
                    type="text"
                    id="nome"
                    placeholder="Nome"
                    required
                >

                <input
                    type="text"
                    id="endereco"
                    placeholder="Endereço"
                    required
                >

                <input
                    type="text"
                    id="telefone"
                    placeholder="Telefone"
                    required
                >

                <button
                    type="submit"
                    class="btn-salvar"
                >
                    Salvar
                </button>

            </form>

        </div>

        <div class="card">

            <table>

                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Endereço</th>
                        <th>Telefone</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="listaClientes"></tbody>

            </table>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
